name: BFASTREAM TV Bot 24/7

on:
  workflow_dispatch: # Manual နှိပ်ခိုင်းဖို့
  schedule:
    - cron: '*/5 * * * *' # 5 မိနစ်တစ်ခါ auto restart

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350 # 6 နာရီနီးပါး run မယ်
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python app.py
